</head>

    <!-- MAIN APP STRUCTURE -->

        <!-- 1. AUTH SCREEN (간편 프로필 설정 입장 화면) -->

                <div class="text-center relative z-10">

                            <button class="avatar-opt h-12 w-12 rounded-xl bg-gray-800 hover:bg-purple-700/50 flex items-center justify-center text-xl text-teal-300 border border-transparent transition duration-150" data-icon="fa-bolt">

                            <button class="avatar-opt h-12 w-12 rounded-xl bg-gray-800 hover:bg-purple-700/50 flex items-center justify-center text-xl text-orange-300 border border-transparent transition duration-150" data-icon="fa-crown">

                    <!-- 닉네임 입력 -->

                        <label for="input-nickname" class="block text-sm font-medium text-gray-400 mb-2">닉네임 설정</label>
                        <input type="text" id="input-nickname" maxlength="15" placeholder="사용할 닉네임을 입력해 주세요" class="w-full bg-gray-800/80 border border-gray-700 focus:border-purple-500 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/20 transition duration-200">

                    <button id="btn-submit-profile" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3.5 px-6 rounded-xl transition duration-200 shadow-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-door-open"></i> 채팅방 입장하기

        <!-- 2. MAIN APP CONTENT (로그인 후 화면) -->
        <div id="main-screen" class="hidden flex-grow flex flex-col h-full">
            <!-- Navigation Bar -->
            <nav class="bg-[#0e1626]/90 border-b border-gray-800 sticky top-0 z-40 backdrop-blur-md">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex items-center justify-between h-16">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-lg">
                                <i class="fa-solid fa-comments text-white text-lg"></i>
                            </div>
                            <span class="gaming-title text-xl font-black text-white tracking-widest neon-text">SUYU CHAT</span>
                        </div>

                        <!-- User Profile Status & Logout -->
                        <div class="flex items-center gap-4">
                            <div class="flex items-center gap-3 bg-gray-800/40 border border-gray-800 py-1.5 px-3 rounded-xl">
                                <div id="nav-user-avatar" class="h-8 w-8 rounded-lg bg-purple-900/60 flex items-center justify-center text-purple-300 text-sm">

            <!-- Content Area (Chat Window) -->

                <!-- Left: Realtime Chat Area -->
                <div class="flex-grow flex flex-col bg-[#111827]/80 border border-gray-800 rounded-2xl overflow-hidden shadow-xl h-full">
                    <!-- Chat Header -->
                    <div class="bg-gray-900/50 p-4 border-b border-gray-800/80 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </span>
                            <div>
                                <h3 class="font-bold text-gray-100 text-sm sm:text-base">수유 실시간 광장</h3>
                                <p class="text-[11px] text-purple-400">서버 데이터 정리를 위해 15분이 지난 채팅 메시지는 자동 삭제됩니다.</p>
                            </div>
                        </div>
                        <span id="active-user-counter" class="text-xs bg-gray-800 text-gray-400 px-2.5 py-1 rounded-full font-medium">연결 중...</span>
                    </div>

                    <!-- Chat Messages Container -->
                    <div id="chat-messages" class="flex-grow p-4 overflow-y-auto space-y-4 chat-scrollbar h-0">
                        <div class="flex items-center justify-center h-full text-gray-500 text-sm">

                    <!-- Chat Input Box -->
                    <form id="chat-form" class="p-3 bg-gray-900/80 border-t border-gray-800/80 flex items-center gap-2">
                        <input type="text" id="chat-input" maxlength="250" placeholder="메시지를 입력하세요 (비속어 자제)" class="flex-grow bg-gray-800/70 border border-gray-700 focus:border-purple-500 focus:outline-none rounded-xl px-4 py-3 text-sm text-white focus:ring-1 focus:ring-purple-500/20">
                        <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white font-bold h-11 px-5 rounded-xl transition duration-150 flex items-center justify-center">

                    </form>
                </div>

                <!-- Right: Online Gamers Panel -->
                <div class="w-full md:w-64 bg-gray-900/60 border border-gray-800 rounded-2xl p-4 flex flex-col h-40 md:h-full overflow-hidden shrink-0">
                    <div class="flex items-center justify-between border-b border-gray-800 pb-2 mb-3">
                        <h4 class="font-bold text-gray-300 text-xs flex items-center gap-2">
                            <i class="fa-solid fa-users text-purple-400"></i> 온라인 멤버
                        </h4>
                        <span class="text-xs bg-purple-900/50 text-purple-300 px-2 py-0.5 rounded-full" id="online-count">0</span>
                    </div>
                    <div id="users-list" class="flex-grow overflow-y-auto chat-scrollbar space-y-2 flex flex-row md:flex-col gap-2 md:gap-0 h-0">
                        <p class="text-xs text-gray-500 text-center py-4 w-full">접속자가 없습니다.</p>

            </main>

    </div>

    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc, 
            getDoc, 
            deleteDoc,
            collection, 
            addDoc, 
            query, 
            onSnapshot, 
            orderBy, 
            limit, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variables
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'suyu-game-community-v1';
        
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBiHlY3xM5y5K7V2_AlQH3YENGNMhK3RNk",
            authDomain: "suyu-74792.firebaseapp.com",
            projectId: "suyu-74792",
            storageBucket: "suyu-74792.firebasestorage.app",
            messagingSenderId: "308516702406",
            appId: "1:308516702406:web:f331aa5fb6e86c97092fc7",
            measurementId: "G-YCVCPD4WFF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Application State
        let currentUser = null;
        let userData = {
            nickname: '',
            avatar: 'fa-ghost'
        };
        let selectedAvatar = 'fa-ghost';

        // Realtime Listeners
        let unsubChat = null;
        let unsubUsers = null;

        // UI Elements
        const loadingScreen = document.getElementById('loading-screen');
        const authScreen = document.getElementById('auth-screen');
        const mainScreen = document.getElementById('main-screen');
        const avatarGrid = document.getElementById('avatar-grid');
        const inputNickname = document.getElementById('input-nickname');
        const btnSubmitProfile = document.getElementById('btn-submit-profile');
        const btnLogout = document.getElementById('btn-logout');

        // Chat UI Elements
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const usersList = document.getElementById('users-list');
        const onlineCount = document.getElementById('online-count');
        const activeUserCounter = document.getElementById('active-user-counter');

        // Custom Modal Controller
        function showCustomModal(title, description, onConfirm = null, onCancel = null) {
            const modal = document.getElementById('custom-modal');
            const mTitle = document.getElementById('modal-title');
            const mDesc = document.getElementById('modal-desc');
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const btnCancel = document.getElementById('modal-btn-cancel');

            mTitle.innerText = title;
            mDesc.innerText = description;
            
            modal.classList.remove('hidden');

            btnConfirm.onclick = () => {
                modal.classList.add('hidden');
                if (onConfirm) onConfirm();
            };

            if (onCancel) {
                btnCancel.classList.remove('hidden');
                btnCancel.onclick = () => {
                    modal.classList.add('hidden');
                    onCancel();
                };
            } else {
                btnCancel.classList.add('hidden');
            }
        }

        // Toast Notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.innerText = message;
            
            if (type === 'error') {
                toast.className = "fixed top-5 right-5 z-50 transform translate-y-0 opacity-100 transition-all duration-300 bg-gray-900 border-l-4 border-red-500 text-white px-6 py-4 rounded-lg shadow-2xl flex items-center gap-3";
                toastIcon.innerHTML = `<i class="fa-solid fa-triangle-exclamation text-red-500"></i>`;
            } else if (type === 'success') {
                toast.className = "fixed top-5 right-5 z-50 transform translate-y-0 opacity-100 transition-all duration-300 bg-gray-900 border-l-4 border-green-500 text-white px-6 py-4 rounded-lg shadow-2xl flex items-center gap-3";
                toastIcon.innerHTML = `<i class="fa-solid fa-circle-check text-green-500"></i>`;
            } else {
                toast.className = "fixed top-5 right-5 z-50 transform translate-y-0 opacity-100 transition-all duration-300 bg-gray-900 border-l-4 border-purple-500 text-white px-6 py-4 rounded-lg shadow-2xl flex items-center gap-3";
                toastIcon.innerHTML = `<i class="fa-solid fa-bell text-purple-400"></i>`;
            }

            toast.style.transform = "translateY(0)";
            toast.style.opacity = "1";

            setTimeout(() => {
                toast.style.transform = "translateY(-100px)";
                toast.style.opacity = "0";
            }, 3000);
        }

        // Exponential Backoff API Wrapper
        async function runWithRetry(fn, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    return await fn();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        // Hide/Show Loading Animation
        function hideLoading() {
            loadingScreen.classList.add('opacity-0');
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
            }, 500);
        }

        function showLoading() {
            loadingScreen.classList.remove('hidden');
            loadingScreen.classList.remove('opacity-0');
        }

        // Initialize App & Authenticate (RULE 3 - Pre-flight)
        const initAuth = async () => {
            try {
                // Suyu Game Community Guest Login Bypass (익명 계정 할당)
                await signInAnonymously(auth);
            } catch (e) {
                console.error("Auth initialization failed:", e);
                showToast("인증 서버 연결에 실패했습니다. 새로고침을 해주세요.", "error");
            } finally {
                hideLoading();
            }
        };

        // Listen for Auth State changes
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await checkUserProfile(user.uid);
            } else {
                currentUser = null;
                showAuthScreen();
            }
        });

        // Check if Private User document exists (RULE 1)
        async function checkUserProfile(uid) {
            try {
                const userDocRef = doc(db, 'artifacts', appId, 'users', uid, 'profile', 'info');
                const userDoc = await runWithRetry(() => getDoc(userDocRef));

                if (userDoc.exists()) {
                    userData = userDoc.data();
                    showMainScreen();
                } else {
                    showAuthScreen(); // Profile Setup Lobby
                    inputNickname.value = "게이머_" + Math.floor(1000 + Math.random() * 9000);
                }
            } catch (error) {
                console.error("Error retrieving user profile:", error);
                showAuthScreen();
            } finally {
                hideLoading();
            }
        }

        // Avatar Selection
        const avatarOpts = document.querySelectorAll('.avatar-opt');
        avatarOpts.forEach(btn => {
            btn.addEventListener('click', () => {
                avatarOpts.forEach(b => {
                    b.classList.remove('bg-purple-900/50', 'border-purple-500/30');
                    b.classList.add('bg-gray-800', 'border-transparent');
                });
                btn.classList.remove('bg-gray-800', 'border-transparent');
                btn.classList.add('bg-purple-900/50', 'border-purple-500/30');
                selectedAvatar = btn.getAttribute('data-icon');
            });
        });

        // Submit Profile Customizations
        btnSubmitProfile.addEventListener('click', async () => {
            const nickname = inputNickname.value.trim();
            if (!nickname) {
                showToast("닉네임을 반드시 입력해야 합니다.", "error");
                return;
            }

            showLoading();
            try {
                userData = {
                    nickname: nickname,
                    avatar: selectedAvatar,
                    updatedAt: new Date().toISOString()
                };

                // Rule 1: Store private user profile configuration
                const userDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'profile', 'info');
                await runWithRetry(() => setDoc(userDocRef, userData));

                // Rule 1: Set user to global public users database
                const publicUserRef = doc(db, 'artifacts', appId, 'public', 'data', 'onlineUsers', currentUser.uid);
                await runWithRetry(() => setDoc(publicUserRef, {
                    nickname: nickname,
                    avatar: selectedAvatar,
                    uid: currentUser.uid,
                    lastActive: serverTimestamp()
                }));

                showToast(`환영합니다, ${nickname} 플레이어님!`, "success");
                showMainScreen();
            } catch (err) {
                console.error("Error setting up profile:", err);
                showToast("프로필 등록에 실패했습니다. 다시 시도해 주세요.", "error");
            } finally {
                hideLoading();
            }
        });

        // SCREEN TOGGLES
        function showAuthScreen() {
            authScreen.classList.remove('hidden');
            mainScreen.classList.add('hidden');
            stopRealtimeListeners();
        }

        function showMainScreen() {
            authScreen.classList.add('hidden');
            mainScreen.classList.remove('hidden');
            
            document.getElementById('nav-user-name').innerText = userData.nickname || 'Gamer';
            document.getElementById('nav-user-avatar').innerHTML = `<i class="fa-solid ${userData.avatar || 'fa-ghost'}"></i>`;

            startRealtimeListeners();
        }

        // Sign Out (Lobby return)
        btnLogout.addEventListener('click', () => {
            showCustomModal("방 나가기", "채팅방에서 나가고 프로필을 재설정하시겠습니까?", async () => {
                showLoading();
                try {
                    if (currentUser) {
                        try {
                            const publicUserRef = doc(db, 'artifacts', appId, 'public', 'data', 'onlineUsers', currentUser.uid);
                            await setDoc(publicUserRef, { status: 'offline', lastActive: serverTimestamp() }, { merge: true });
                        } catch(e) {}
                    }
                    await signOut(auth);
                    showToast("성공적으로 퇴장하였습니다.", "success");
                } catch(e) {
                    showToast("오류가 발생했습니다.", "error");
                } finally {
                    hideLoading();
                }
            }, () => {});
        });

        // Stop all Firebase Realtime listeners
        function stopRealtimeListeners() {
            if (unsubChat) { unsubChat(); unsubChat = null; }
            if (unsubUsers) { unsubUsers(); unsubUsers = null; }
        }

        // Start Firebase Realtime Listeners (RULE 3)
        function startRealtimeListeners() {
            if (!currentUser) return;

            stopRealtimeListeners();

            // 1. 실시간 채팅 메시지 리스너 (RULE 2: Simple query with limit)
            const chatColRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
            const chatQuery = query(chatColRef, orderBy('createdAt', 'desc'), limit(50));

            unsubChat = onSnapshot(chatQuery, (snapshot) => {
                const messages = [];
                snapshot.forEach((doc) => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                
                messages.reverse();
                renderChatMessages(messages);
                
                // 메시지 청소 스케줄링 실행
                cleanupOldMessages(messages);
            }, (error) => {
                console.error("Chat snapshot error:", error);
            });

            // 2. 실시간 접속자 리스너
            const onlineColRef = collection(db, 'artifacts', appId, 'public', 'data', 'onlineUsers');
            const onlineQuery = query(onlineColRef, limit(100));

            unsubUsers = onSnapshot(onlineQuery, (snapshot) => {
                const users = [];
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data && data.nickname && data.status !== 'offline') {
                        users.push(data);
                    }
                });
                renderOnlineUsers(users);
            }, (error) => {
                console.error("Online users snapshot error:", error);
            });

            updatePresenceHeartbeat();
        }

        // 15분 만료 및 자동 시스템 삭제 처리 스케줄러 (용량 제한 대응)
        async function cleanupOldMessages(messages) {
            if (messages.length === 0) return;

            const now = Date.now();
            const fifteenMinutesMs = 15 * 60 * 1000;
            const expiredDocs = [];

            messages.forEach((msg) => {
                if (msg.createdAt) {
                    const createdTime = msg.createdAt.toDate ? msg.createdAt.toDate().getTime() : new Date(msg.createdAt).getTime();
                    if (now - createdTime > fifteenMinutesMs) {
                        expiredDocs.push(msg);
                    }
                }
            });

            if (expiredDocs.length > 0) {
                let deletedCount = 0;
                for (const docToDel of expiredDocs) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'chats', docToDel.id);
                        await deleteDoc(docRef);
                        deletedCount++;
                    } catch (e) {
                        console.error("Cleanup deletion error:", e);
                    }
                }

                // 중복 알림 등록 방지 (30초 쿨다운)
                if (deletedCount > 0) {
                    const lastClearedMsg = messages.find(m => m.isSystem && m.text === "All chats have been cleared.");
                    let shouldPostSystemMsg = true;

                    if (lastClearedMsg && lastClearedMsg.createdAt) {
                        const lastTime = lastClearedMsg.createdAt.toDate ? lastClearedMsg.createdAt.toDate().getTime() : new Date(lastClearedMsg.createdAt).getTime();
                        if (now - lastTime < 30000) {
                            shouldPostSystemMsg = false;
                        }
                    }

                    if (shouldPostSystemMsg) {
                        try {
                            const chatColRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                            await addDoc(chatColRef, {
                                text: "All chats have been cleared.",
                                isSystem: true,
                                senderName: "SYSTEM",
                                senderUid: "system-cleaner",
                                createdAt: serverTimestamp()
                            });
                        } catch (e) {
                            console.error("Failed to post system cleaning message:", e);
                        }
                    }
                }
            }
        }

        // Periodically ping online status
        async function updatePresenceHeartbeat() {
            if (!currentUser) return;
            try {
                const publicUserRef = doc(db, 'artifacts', appId, 'public', 'data', 'onlineUsers', currentUser.uid);
                await setDoc(publicUserRef, {
                    nickname: userData.nickname || 'Unknown Gamer',
                    avatar: userData.avatar || 'fa-ghost',
                    uid: currentUser.uid,
                    lastActive: serverTimestamp(),
                    status: 'online'
                }, { merge: true });
            } catch(e) {
                console.warn("Heartbeat update missed:", e);
            }
            setTimeout(updatePresenceHeartbeat, 120000);
        }

        // HTML safe escaping to prevent XSS injection
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text ? text.replace(/[&<>"']/g, function(m) { return map[m]; }) : '';
        }

        // Render chat messages inside UI (SYSTEM 메시지 템플릿 포함)
        function renderChatMessages(messages) {
            chatMessages.innerHTML = '';
            
            if (messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-500">
                        <i class="fa-solid fa-comments text-4xl mb-2 text-gray-700"></i>
                        <p class="text-sm font-medium">채팅방이 비어있습니다.</p>
                        <p class="text-xs">첫 대화를 나누며 수유 유저들과 소통을 시작해 보세요!</p>
                    </div>
                `;
                return;
            }

            messages.forEach((msg) => {
                // SYSTEM 자동 정리 메시지 렌더링
                if (msg.isSystem && msg.text === "All chats have been cleared.") {
                    chatMessages.innerHTML += `
                        <div class="flex justify-center my-3 animate-pulse">
                            <div class="bg-purple-950/40 border border-purple-500/30 text-purple-300 rounded-xl px-4 py-2 text-xs flex items-center gap-2">
                                <i class="fa-solid fa-robot"></i>
                                <span class="font-medium tracking-wide">SYSTEM: All chats have been cleared.</span>
                            </div>
                        </div>
                    `;
                    return;
                }

                const isMyMessage = msg.senderUid === currentUser.uid;
                const escText = escapeHtml(msg.text);
                const escName = escapeHtml(msg.senderName);
                const escAvatar = escapeHtml(msg.senderAvatar || 'fa-ghost');
                
                let timeStr = "오후";
                if (msg.createdAt) {
                    const d = msg.createdAt.toDate ? msg.createdAt.toDate() : new Date(msg.createdAt);
                    timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                const msgHtml = isMyMessage ? `
                    <div class="flex items-end justify-end gap-2.5">
                        <span class="text-[10px] text-gray-500 mb-1">${timeStr}</span>
                        <div class="flex flex-col gap-1 max-w-[75%]">
                            <div class="bg-gradient-to-tr from-purple-600 to-indigo-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 text-sm shadow-md break-all">
                                ${escText}
                            </div>
                        </div>
                    </div>
                ` : `
                    <div class="flex gap-3">
                        <div class="h-10 w-10 flex-shrink-0 rounded-xl bg-gray-800 border border-gray-700 flex items-center justify-center text-purple-400 text-base shadow-sm">
                            <i class="fa-solid ${escAvatar}"></i>
                        </div>
                        <div class="flex flex-col gap-1 max-w-[75%]">
                            <span class="text-xs font-bold text-gray-400">${escName} <span class="text-[9px] font-normal text-purple-400 ml-1">UID: ${msg.senderUid}</span></span>
                            <div class="flex items-end gap-2.5">
                                <div class="bg-gray-800 text-gray-100 rounded-2xl rounded-tl-none px-4 py-2.5 text-sm border border-gray-700/80 shadow-md break-all">
                                    ${escText}
                                </div>
                                <span class="text-[10px] text-gray-500 mb-1">${timeStr}</span>
                            </div>
                        </div>
                    </div>
                `;

                chatMessages.innerHTML += msgHtml;
            });

            // Auto-scroll Down
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Render Online Users List
        function renderOnlineUsers(users) {
            usersList.innerHTML = '';
            onlineCount.innerText = users.length;
            activeUserCounter.innerText = `온라인: ${users.length}명`;

            if (users.length === 0) {
                usersList.innerHTML = `<p class="text-xs text-gray-500 text-center py-4 w-full">접속자가 없습니다.</p>`;
                return;
            }

            users.forEach((u) => {
                const escName = escapeHtml(u.nickname);
                const escAvatar = escapeHtml(u.avatar || 'fa-ghost');
                const isMe = u.uid === currentUser.uid;

                const userHtml = `
                    <div class="flex items-center gap-2.5 p-2 rounded-xl bg-gray-800/40 hover:bg-gray-800 border border-transparent hover:border-gray-700/50 transition flex-shrink-0 md:flex-shrink">
                        <div class="relative">
                            <div class="h-8 w-8 rounded-lg bg-gray-700/60 border border-gray-600 flex items-center justify-center text-purple-300 text-sm">
                                <i class="fa-solid ${escAvatar}"></i>
                            </div>
                            <span class="absolute bottom-[-2px] right-[-2px] h-2.5 w-2.5 rounded-full bg-green-500 border-2 border-gray-900"></span>
                        </div>
                        <div class="text-left">
                            <p class="text-xs font-bold text-gray-200 truncate max-w-[100px] sm:max-w-[140px]">${escName} ${isMe ? '<span class="text-[9px] text-pink-400 font-normal ml-0.5">(나)</span>' : ''}</p>
                            <p class="text-[9px] text-gray-500 truncate max-w-[100px] sm:max-w-[140px]">UID: ${u.uid}</p>
                        </div>
                    </div>
                `;
                usersList.innerHTML += userHtml;
            });
        }

        // Send Message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                showToast("인증 세션이 만료되었습니다.", "error");
                return;
            }

            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';

            try {
                const chatColRef = collection(db, 'artifacts', appId, 'public', 'data', 'chats');
                await addDoc(chatColRef, {
                    text: text,
                    senderName: userData.nickname || 'Unknown Gamer',
                    senderAvatar: userData.avatar || 'fa-ghost',
                    senderUid: currentUser.uid,
                    createdAt: serverTimestamp()
                });
            } catch (err) {
                console.error("Message send failure:", err);
                showToast("실시간 채팅 전송에 실패했습니다.", "error");
            }
        });

        // Start Core Flows
        initAuth();
    </script>
</body>
</html>
