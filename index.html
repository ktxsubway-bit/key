<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>실시간 파이어베이스 채팅 시스템</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons (디자인용 아이콘 스크립트) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col justify-between overflow-hidden">

  <!-- 1. 닉네임 입력 모달 (입장 전 화면) -->
  <div id="login-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 transition-all duration-300">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-md shadow-2xl transform transition-all">
      <div class="flex items-center gap-3 mb-4">
        <div class="bg-indigo-600 p-3 rounded-xl">
          <i data-lucide="message-square" class="w-6 h-6 text-white"></i>
        </div>
        <div>
          <h2 class="text-xl font-bold text-white">실시간 채팅방 입장</h2>
          <p class="text-xs text-slate-400">활동할 닉네임을 설정해 주세요.</p>
        </div>
      </div>
      <div class="space-y-4">
        <div>
          <label for="nickname-input" class="block text-sm font-medium text-slate-300 mb-2">닉네임</label>
          <input type="text" id="nickname-input" max="15" placeholder="닉네임을 입력하세요 (최대 15자)" 
                 class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
        </div>
        <button id="btn-enter" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
          채팅방 입장하기
          <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </button>
        <p id="login-error" class="text-red-400 text-xs text-center hidden">닉네임을 입력해 주세요!</p>
      </div>
    </div>
  </div>

  <!-- 2. 메인 채팅 인터페이스 -->
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center justify-between shadow-md">
    <div class="flex items-center gap-3">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
      </span>
      <h1 class="font-bold text-lg text-white tracking-wide">실시간 로비 채팅</h1>
      <div class="bg-slate-900 border border-slate-700 rounded-full px-3 py-1 flex items-center gap-1.5 text-xs text-slate-300">
        <i data-lucide="users" class="w-3.5 h-3.5 text-indigo-400"></i>
        현재 접속: <span id="member-count" class="font-bold text-indigo-400">0</span>명
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span id="user-badge" class="text-sm bg-slate-700 text-slate-200 px-3 py-1.5 rounded-lg border border-slate-600 hidden font-medium"></span>
      <button id="btn-exit" class="text-slate-400 hover:text-rose-400 transition-all text-sm flex items-center gap-1">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        퇴장
      </button>
    </div>
  </header>

  <!-- 메시지 정리 안내 알림 (10초간 노출 예정) -->
  <div id="cleaning-banner" class="hidden bg-amber-500/10 border-b border-amber-500/20 px-6 py-3 flex items-center justify-center gap-2.5 text-amber-300 text-sm font-semibold transition-all duration-300">
    <i data-lucide="alert-triangle" class="w-5 h-5 animate-bounce"></i>
    <span>메시지가 정리되었습니다. (10초 동안 새로운 메시지를 전송할 수 없습니다.)</span>
  </div>

  <!-- 채팅 메시지 영역 -->
  <main id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-950">
    <div class="flex items-center justify-center h-full text-slate-500 text-sm flex-col gap-2">
      <i data-lucide="message-square-dashed" class="w-12 h-12 stroke-[1.5] text-slate-600"></i>
      <span>닉네임을 입력하고 입장하시면 실시간 대화가 시작됩니다.</span>
    </div>
  </main>

  <!-- 채팅 입력창 영역 -->
  <footer class="bg-slate-800 border-t border-slate-700 p-4 shadow-2xl">
    <form id="chat-form" class="max-w-4xl mx-auto flex gap-2">
      <input type="text" id="chat-input" disabled placeholder="채팅방에 먼저 입장해 주세요..."
             class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
      <button type="submit" id="btn-send" disabled
              class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 disabled:bg-slate-700 text-white px-6 rounded-xl font-semibold transition-all shadow-md flex items-center justify-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
        <span>전송</span>
        <i data-lucide="send" class="w-4 h-4"></i>
      </button>
    </form>
  </footer>

  <!-- Firebase JavaScript SDK v11.x+ 구문 적용 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc, 
      updateDoc, 
      collection, 
      addDoc, 
      query, 
      orderBy, 
      onSnapshot, 
      getDocs, 
      deleteDoc, 
      writeBatch, 
      serverTimestamp, 
      increment,
      runTransaction
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // 제공해주신 파이어베이스 설정값 활용
    const firebaseConfig = {
      apiKey: "AIzaSyBiHlY3xM5y5K7V2_AlQH3YENGNMhK3RNk",
      authDomain: "suyu-74792.firebaseapp.com",
      projectId: "suyu-74792",
      storageBucket: "suyu-74792.firebasestorage.app",
      messagingSenderId: "308516702406",
      appId: "1:308516702406:web:f331aa5fb6e86c97092fc7",
      measurementId: "G-YCVCPD4WFF"
    };

    // Firebase 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // 글로벌 상태 변수
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'suyu-chat-room';
    let currentUser = null;
    let myNickname = '';
    let isEntered = false;
    let cleaningTimeout = null;
    let cleaningActive = false; // 10초 대기 중인지 여부

    // DOM 요소 캐싱
    const loginModal = document.getElementById('login-modal');
    const nicknameInput = document.getElementById('nickname-input');
    const btnEnter = document.getElementById('btn-enter');
    const loginError = document.getElementById('login-error');
    
    const memberCountEl = document.getElementById('member-count');
    const userBadge = document.getElementById('user-badge');
    const btnExit = document.getElementById('btn-exit');
    const cleaningBanner = document.getElementById('cleaning-banner');
    
    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const chatInput = document.getElementById('chat-input');
    const btnSend = document.getElementById('btn-send');

    // Firestore 경로 규칙 준수 (Rule 1: /artifacts/{appId}/public/data/{collectionName})
    const messagesCollection = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
    const counterDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'counters', 'memberCounter');

    // Lucide Icons 렌더링
    lucide.createIcons();

    // 1. Firebase 익명 인증 및 초기 셋업
    async function initApp() {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.error("인증 실패:", error);
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        // 초기화 시 카운터 문서가 없으면 강제 초기값 0으로 생성
        initializeCounter();
      }
    });

    // 접속 멤버 카운터 초기값 세팅 함수
    async function initializeCounter() {
      try {
        const docSnap = await getDoc(counterDocRef);
        if (!docSnap.exists()) {
          await setDoc(counterDocRef, { count: 0 }, { merge: true });
        }
      } catch (err) {
        console.error("카운터 초기화 오류:", err);
      }
    }

    // 2. 실시간 멤버수 관리 기능 (입장 시 가산, 퇴장 시 감산)
    async function adjustMemberCount(value) {
      if (!currentUser) return;
      try {
        await runTransaction(db, async (transaction) => {
          const sfDoc = await transaction.get(counterDocRef);
          if (!sfDoc.exists()) {
            transaction.set(counterDocRef, { count: Math.max(0, value) });
          } else {
            const newCount = (sfDoc.data().count || 0) + value;
            transaction.update(counterDocRef, { count: Math.max(0, newCount) });
          }
        });
      } catch (error) {
        console.error("멤버 수 업데이트 에러:", error);
      }
    }

    // 실시간 멤버 수 관측
    function listenMemberCount() {
      onSnapshot(counterDocRef, (docSnap) => {
        if (docSnap.exists()) {
          const data = docSnap.data();
          memberCountEl.textContent = data.count || 0;
        }
      }, (error) => {
        console.error("멤버 수 동기화 에러:", error);
      });
    }

    // 3. 15분 경과한 메시지 삭제 및 10초 쿨다운 배너 작동 로직
    // Firestore Compound Query 및 Complex Logic 제한 우회 (JS 메모리에서 판단)
    async function checkAndCleanMessages(allMessages) {
      if (allMessages.length === 0 || cleaningActive) return;

      // 가장 처음(가장 오래된) 메시지의 타임스탬프 기준 검사
      const oldestMsg = allMessages[0];
      if (!oldestMsg.timestamp) return; // 서버 타임스탬프 생성 전 빈 값 스킵

      const oldestTime = oldestMsg.timestamp.toDate ? oldestMsg.timestamp.toDate().getTime() : oldestMsg.timestamp;
      const currentTime = Date.now();
      const fifteenMinutesMs = 15 * 60 * 1000; // 15분

      if (currentTime - oldestTime >= fifteenMinutesMs) {
        // 15분 지남 -> 청소 프로세스 트리거
        await triggerCleaningProcess();
      }
    }

    // 일괄 청소 함수
    async function triggerCleaningProcess() {
      cleaningActive = true;
      toggleChatInputState(true); // 입력 일시정지

      try {
        // 모든 메시지 가져와서 Batch Delete 처리 (Rule 2 준수: 심플 쿼리 후 메모리 핸들링)
        const snapshot = await getDocs(messagesCollection);
        const batch = writeBatch(db);
        snapshot.docs.forEach((doc) => {
          batch.delete(doc.ref);
        });
        await batch.commit();

        // UI에 청소 안내 배너 활성화 (10초 타이머 작동)
        showCleaningBanner();

      } catch (err) {
        console.error("데이터 정리 중 에러:", err);
        cleaningActive = false;
        toggleChatInputState(false);
      }
    }

    // 청소 완료 안내 배너 노출 (10초간)
    function showCleaningBanner() {
      // 만약 이미 실행 중인 청소 타이머가 있다면 삭제
      if (cleaningTimeout) {
        clearTimeout(cleaningTimeout);
      }

      cleaningBanner.classList.remove('hidden');
      toggleChatInputState(true);

      // 10초 뒤 정리 배너 숨김 및 채팅창 복구
      cleaningTimeout = setTimeout(() => {
        cleaningBanner.classList.add('hidden');
        cleaningActive = false;
        if (isEntered) {
          toggleChatInputState(false);
        }
      }, 10000);
    }

    // 입력창 상태 업데이트
    function toggleChatInputState(isDisabled) {
      if (isDisabled) {
        chatInput.disabled = true;
        btnSend.disabled = true;
        chatInput.placeholder = "현재 메시지가 정리 중입니다. 잠시만 기다려 주세요...";
      } else {
        chatInput.disabled = false;
        btnSend.disabled = false;
        chatInput.placeholder = "메시지를 입력하세요...";
        chatInput.focus();
      }
    }

    // 4. 실시간 메시지 관측 및 렌더링
    function listenMessages() {
      // 복잡한 Compound Query 회피: 가벼운 정렬 쿼리만 적용 (Rule 2 준수)
      const q = query(messagesCollection, orderBy('timestamp', 'asc'));

      onSnapshot(q, (snapshot) => {
        const messages = [];
        chatBox.innerHTML = '';

        if (snapshot.empty) {
          chatBox.innerHTML = `
            <div class="flex items-center justify-center h-full text-slate-500 text-sm flex-col gap-2">
              <i data-lucide="message-square" class="w-12 h-12 stroke-[1.5] text-slate-600"></i>
              <span>정리되었거나 생성된 메시지가 없습니다. 대화를 시작해 보세요!</span>
            </div>
          `;
          lucide.createIcons();
          return;
        }

        snapshot.forEach((doc) => {
          const data = doc.data();
          data.id = doc.id;
          messages.push(data);
        });

        // 15분 경과 자동 청소 검증 실행
        checkAndCleanMessages(messages);

        // 메시지 렌더링
        messages.forEach((msg) => {
          const isMe = msg.nickname === myNickname;
          const messageWrapper = document.createElement('div');
          messageWrapper.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-1 mb-2 animate-fadeIn`;

          const timeString = msg.timestamp && msg.timestamp.toDate 
            ? msg.timestamp.toDate().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }) 
            : '전송 중...';

          messageWrapper.innerHTML = `
            <div class="flex items-center gap-1.5 text-xs text-slate-400 px-1">
              <span class="font-semibold text-slate-300">${msg.nickname}</span>
              <span class="text-[10px]">•</span>
              <span>${timeString}</span>
            </div>
            <div class="max-w-[80%] rounded-2xl px-4 py-2.5 text-sm shadow-md break-all
              ${isMe 
                ? 'bg-indigo-600 text-white rounded-tr-none' 
                : 'bg-slate-800 text-slate-100 rounded-tl-none border border-slate-700'
              }">
              ${escapeHtml(msg.text)}
            </div>
          `;
          chatBox.appendChild(messageWrapper);
        });

        // 자동 스크롤 하단 이동
        chatBox.scrollTop = chatBox.scrollHeight;
      }, (error) => {
        console.error("메시지 동기화 중 오류가 발생했습니다:", error);
      });
    }

    // HTML 엔티티 이스케이프 (보안강화)
    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }

    // 5. 입장 및 퇴장 이벤트 처리
    async function handleEntrance() {
      const nicknameValue = nicknameInput.value.trim();
      if (!nicknameValue) {
        loginError.textContent = "닉네임을 입력해 주세요!";
        loginError.classList.remove('hidden');
        return;
      }

      if (!currentUser) {
        loginError.textContent = "연결을 준비 중입니다. 잠시 후 다시 시도해 주세요.";
        loginError.classList.remove('hidden');
        return;
      }

      myNickname = nicknameValue;
      isEntered = true;

      // UI 업데이트
      userBadge.textContent = myNickname;
      userBadge.classList.remove('hidden');
      loginModal.classList.add('opacity-0', 'pointer-events-none');
      
      if (!cleaningActive) {
        toggleChatInputState(false);
      }

      // 1) 멤버 카운트 가산
      await adjustMemberCount(1);
      
      // 2) 실시간 리스너 작동 개시
      listenMemberCount();
      listenMessages();

      // 3) 입장 안내 메시지 작성
      try {
        await addDoc(messagesCollection, {
          nickname: "[시스템]",
          text: `📢 ${myNickname} 님이 입장하셨습니다.`,
          timestamp: serverTimestamp()
        });
      } catch (err) {
        console.error("입장 알림 기록 실패:", err);
      }
    }

    async function handleExit() {
      if (!isEntered) return;

      try {
        // 퇴장 알림 남기기
        await addDoc(messagesCollection, {
          nickname: "[시스템]",
          text: `👋 ${myNickname} 님이 퇴장하셨습니다.`,
          timestamp: serverTimestamp()
        });

        // 멤버 수 차감
        await adjustMemberCount(-1);
      } catch (err) {
        console.error("퇴장 처리 실패:", err);
      } finally {
        // 페이지 새로고침하여 초기 상태로 복귀
        window.location.reload();
      }
    }

    // 6. 이벤트 바인딩
    btnEnter.addEventListener('click', handleEntrance);
    nicknameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleEntrance();
    });

    btnExit.addEventListener('click', handleExit);

    // 채팅 입력 전송 이벤트
    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text || cleaningActive) return;

      chatInput.value = '';

      try {
        await addDoc(messagesCollection, {
          nickname: myNickname,
          text: text,
          timestamp: serverTimestamp()
        });
      } catch (error) {
        console.error("메시지 전송 오류:", error);
      }
    });

    // 브라우저 이탈(창 닫기, 탭 전환 등) 시 비동기적인 실시간 멤버 감소 처리
    window.addEventListener('beforeunload', () => {
      if (isEntered) {
        // 동기 수동 수단으로 카운트 업데이트 시도
        adjustMemberCount(-1);
      }
    });

    // 시작 지점 실행
    initApp();
  </script>
</body>
</html>
